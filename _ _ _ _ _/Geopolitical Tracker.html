<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>지정학 이슈 트래커 · Geopolitical Issue Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Noto Sans KR','Helvetica Neue', Helvetica, Arial, sans-serif; color: #202124; background: #f8f9fa; -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes geoPulse {
      0%   { transform: translate(-50%, 50%) scale(0.6); opacity: 0.35; }
      100% { transform: translate(-50%, 50%) scale(2.2); opacity: 0; }
    }
    @keyframes geoPulse2 {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-track:hover { animation-play-state: paused; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; border: 2px solid #fff; }
    ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- D3 + topojson for map rendering -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

  <!-- Data -->
  <script src="data/countries.js"></script>
  <script src="data/cities.js"></script>
  <script src="data/seed.js"></script>
  <script src="utils/thumbnails.js"></script>

  <!-- Giscus config: fill in after deploying. See README.md -->
  <script>
    window.GISCUS_CONFIG = {
      repo: "OWNER/REPO",           // e.g. "myname/geo-tracker"
      repoId: "",                    // from giscus.app
      category: "General",
      categoryId: ""                 // from giscus.app
    };
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Components -->
  <script type="text/babel" src="components/MarketTicker.jsx"></script>
  <script type="text/babel" src="components/WorldMap.jsx"></script>
  <script type="text/babel" src="components/SidePanel.jsx"></script>
  <script type="text/babel" src="components/Timeline.jsx"></script>
  <script type="text/babel" src="components/PasteModal.jsx"></script>
  <script type="text/babel" src="components/Comments.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
